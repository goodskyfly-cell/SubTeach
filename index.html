<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>5以內減法隨機出題-A4單頁完美版</title>
    <style>
        /* A4 列印精確控制 */
        @page {
            size: A4;
            margin: 0; /* 邊距交由 worksheet 控制 */
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; overflow: hidden; }
            .worksheet { 
                box-shadow: none !important;
                border: none !important;
                width: 210mm;
                height: 290mm; /* 稍微縮小，留出緩衝避免產生第二頁 */
                padding: 10mm 15mm;
                page-break-after: avoid; /* 強制不分頁 */
            }
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 20px;
            margin: 0;
        }

        .no-print {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        button {
            padding: 8px 18px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            color: white;
        }
        .btn-refresh { background-color: #007bff; }
        .btn-print { background-color: #28a745; }

        /* A4 容器 */
        .worksheet {
            width: 210mm;
            height: 280mm; /* 鎖定高度，確保五題平分後不溢出 */
            background: white;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 10mm 15mm;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
            border-bottom: 2px solid #000;
        }

        .instruction {
            background-color: #fffde7;
            border: 1.5px solid #fbc02d;
            border-radius: 5px;
            padding: 8px 15px;
            font-size: 16px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        #problem-list {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-between; /* 自動均分垂直空間 */
        }

        .problem-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
            border-bottom: 1px dashed #ccc;
            flex: 1; /* 每題佔據等高空間 */
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .num {
            font-size: 52px;
            font-weight: bold;
            line-height: 1;
        }

        .sym {
            font-size: 40px;
            font-weight: bold;
        }

        .draw-box {
            width: 120px; 
            height: 75px; 
            border: 2.5px solid #000;
            border-radius: 12px;
            background-color: #fff;
        }

        .ans-box {
            border: 3.5px solid #d32f2f;
            background-color: #fff8f8;
        }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="btn-refresh" onclick="generateProblems()">🔄 重新出新題目</button>
        <button class="btn-print" onclick="window.print()">🖨️ 列印這頁練習單</button>
    </div>

    <div class="worksheet">
        <div class="header">
            <h1 style="margin: 5px 0; font-size: 26px;">🍎 減法練習：畫一畫、數一數 🍎</h1>
        </div>
        
        <div class="instruction">
            <strong>【給學生的步驟指引】</strong><br>
            1. 在數字下面畫圓圈 ○ | 2. 看到 <strong>-</strong> 就畫掉 <strong>X</strong> | 3. 最後剩下的畫在紅框裡。
        </div>

        <div id="problem-list">
            </div>
    </div>

    <script>
        function generateProblems() {
            const container = document.getElementById('problem-list');
            container.innerHTML = ''; 

            for (let i = 0; i < 5; i++) {
                let a = Math.floor(Math.random() * 4) + 2; 
                let b = Math.floor(Math.random() * a) + 1; 

                const row = document.createElement('div');
                row.className = 'problem-row';
                if (i === 4) row.style.borderBottom = 'none';

                row.innerHTML = `
                    <div class="column">
                        <div class="num">${a}</div>
                        <div class="draw-box"></div>
                    </div>
                    <div class="sym">-</div>
                    <div class="column">
                        <div class="num">${b}</div>
                        <div class="draw-box"></div>
                    </div>
                    <div class="sym">=</div>
                    <div class="column">
                        <div class="num">?</div>
                        <div class="ans-box draw-box"></div>
                    </div>
                `;
                container.appendChild(row);
            }
        }
        window.onload = generateProblems;
    </script>
</body>
</html>
